
# ============================================================
# Esparagus-Echo - Snapclient Configuration
# ============================================================
# ESP32-S3 audio board with dual MAX98357A DAC and onboards I2S Microphone
# Configured as a Snapcast client for synchronized audio
# There are two implementations available:
# 1) Basic snapclient without DSP controls (c-MM original port)
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================
substitutions:
  name: esphome-web-a87b38
  friendly_name: Esparagus-Echo-Duo
  task_stack_in_psram: "true"

  # ===== Board-Specific Pinouts =====
  # I2S audio pins
  i2s_lrclk_pin: GPIO8
  i2s_bclk_pin: GPIO18
  i2s_dout_pin: GPIO17

  # I2S microphone pins
  i2s_mic_lrclk_pin: GPIO7
  i2s_mic_bclk_pin: GPIO16
  i2s_mic_din_pin: GPIO15

  # DAC enable pins
  dac_enable_pin: GPIO9
  dac_enable_restore_mode: ALWAYS_OFF

  # RGB LED
  rgb_led_pin: GPIO42
  num_leds: 3

  # SPI pins (for ethernet)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13
  
  # Ethernet pins (if using ethernet instead of wifi)
  eth_cs_pin: GPIO10
  eth_interrupt_pin: GPIO6
  eth_reset_pin: GPIO5

  # ===== Snapcast Server Configuration =====
  snapcast_server_ip: "192.168.1.49"
  snapcast_server_port: "1704"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.4
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio


esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

logger:
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esparagus-media-center
    ref: main
    files:
      # Basic implementation without DSP controls, but with playback events (DAC_EN hook)
      - firmware/esphome/packages/snapclient-newer.yaml
      - firmware/esphome/packages/dac-switch.yaml
      - firmware/esphome/packages/snapclient-addon-dac-enable.yaml

      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml
      - firmware/esphome/packages/light-x.yaml
      # Optional ethernet (replace wifi config if you use this, you need to exclude OLED package if you do this to free up SPI bus)
      # - firmware/esphome/packages/ethernet-w5500.yaml