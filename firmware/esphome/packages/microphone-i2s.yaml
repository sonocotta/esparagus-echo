# ============================================================
# Micprophone - I2S Audio Setup and Mic Configuration
# ============================================================
# Configures I2S mic input and related settings for Esparagus-Echo
# Requires substitutions:
#   - i2s_lrclk_pin
#   - i2s_bclk_pin
#   - i2s_dout_pin
#   - task_stack_in_psram
# ============================================================

substitutions:
  # I2S microphone bus
  i2s_mic_bus_id: i2s_in

i2s_audio:
- id: ${i2s_mic_bus_id}
  i2s_lrclk_pin: ${i2s_mic_lrclk_pin}
  i2s_bclk_pin: ${i2s_mic_bclk_pin}